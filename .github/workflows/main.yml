name: CI Pipeline

on:
  push:
    branches:
      - 'feature/**' # для всех feature-веток
      - develop # для интеграции
      - master # для релизов
  pull_request:
    branches:
      - develop
      - master

jobs:
  # Легковесный CI для feature/*
  feature-checks:
    if: startsWith(github.ref, 'refs/heads/feature/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # Полный прогон на develop (с билдом)
  develop-checks:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: dist/

  # Релизная сборка на master
  release:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: dist/
